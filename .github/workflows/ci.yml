name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --------------------------------------------------------------------------
  # Lint + unit tests — fast feedback, runs for every trigger.
  # --------------------------------------------------------------------------
  lint-test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install project (with dev dependencies)
        run: uv sync --frozen

      - name: Ruff — lint
        run: uv run ruff check .

      - name: Ruff — format check
        run: uv run ruff format --check .

      - name: Pytest (unit only)
        run: uv run pytest -q -m "not integration"

  # --------------------------------------------------------------------------
  # Integration tests — exercise startup & one CRUD round-trip against a
  # real PostgreSQL via testcontainers. Docker is provided by ubuntu-latest.
  # --------------------------------------------------------------------------
  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint-test
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install project (with dev dependencies)
        run: uv sync --frozen

      - name: Pytest (integration)
        env:
          RUN_INTEGRATION: "1"
        run: uv run pytest -q -m integration

  # --------------------------------------------------------------------------
  # Docker build (and push on main / tags).
  # For PRs: build only, no push, no login.
  # --------------------------------------------------------------------------
  docker:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: lint-test
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write  # reserved for future cosign / OIDC signing
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
