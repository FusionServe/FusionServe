site_name: FusionServe
site_description: Automatic generation of REST and GraphQL APIs by database introspection.
site_url: https://docs.fusionserve.dev

repo_name: FusionServe/FusionServe
repo_url: https://github.com/FusionServe/FusionServe

strict: false
site_dir: docs/_build

theme:
  name: "material"
  #custom_dir: docs/overrides
  palette:

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github
  features:
    - content.code.copy
    - toc.follow
    - navigation.indexes

nav:
  - Introduction: "index.md"
  - Features: features/
  - Code Reference: reference/fusionserve/
  #- Release Notes: "release-notes.md"
  #- Contributing: "contributing.md"

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true

watch:
  - src/fusionserve
  - docs

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_section_style: list
            show_root_toc_entry: false
            members_order: source
            separate_signature: true
            filters: ["!^_"]
            docstring_style: google
            docstring_options:
              ignore_init_summary: true
            inherited_members: true
            merge_init_into_class: true
            parameter_headings: true
            show_signature_annotations: true
            show_source: false
            signature_crossrefs: true

          inventories:
            - url: https://docs.python.org/3/objects.inv
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
